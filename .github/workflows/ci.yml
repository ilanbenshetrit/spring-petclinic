name: JFrog DevSecOps Pipeline
on:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      - name: Configure Maven for JFrog
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << SETTINGS
          <settings>
            <servers>
              <server>
                <id>jfrog</id>
                <username>${{ secrets.JF_USERNAME }}</username>
                <password>${{ secrets.JF_ACCESS_TOKEN }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>jfrog</id>
                <mirrorOf>*</mirrorOf>
                <url>${{ secrets.JF_URL }}/artifactory/libs-release</url>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
      - run: mvn clean test -B
      - run: mvn package -DskipTests -B
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: target
      - uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      - run: docker login ${{ secrets.JF_DOCKER_REPO_HOST }} -u ${{ secrets.JF_USERNAME }} -p ${{ secrets.JF_ACCESS_TOKEN }}
      - run: docker build -t ${{ secrets.JF_DOCKER_REPO_HOST }}/docker-local/spring-petclinic:${{ github.sha }} .
      - run: jf docker push ${{ secrets.JF_DOCKER_REPO_HOST }}/docker-local/spring-petclinic:${{ github.sha }}
      - run: jf rt build-publish spring-petclinic ${{ github.run_number }}
